<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fond noir -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <!-- Connexions entre agents (lignes) -->
  <line x1="11" y1="10" x2="21" y2="10" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="11" y1="10" x2="8" y2="19" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="21" y1="10" x2="23" y2="19" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="8" y1="19" x2="16" y2="24" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="23" y1="19" x2="16" y2="24" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="15" x2="11" y2="10" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="15" x2="21" y2="10" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="15" x2="8" y2="19" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="15" x2="23" y2="19" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="15" x2="16" y2="24" stroke="#E8FF00" stroke-width="1.2" opacity="0.5"/>
  <!-- Noeuds agents (points verts) -->
  <circle cx="16" cy="15" r="2.8" fill="#E8FF00"/>
  <circle cx="11" cy="10" r="2" fill="#E8FF00"/>
  <circle cx="21" cy="10" r="2" fill="#E8FF00"/>
  <circle cx="8" cy="19" r="2" fill="#E8FF00"/>
  <circle cx="23" cy="19" r="2" fill="#E8FF00"/>
  <circle cx="16" cy="24" r="2" fill="#E8FF00"/>
</svg>
