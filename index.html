<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Agents — Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0A0A0A;--surface:#111111;--card:#161616;
    --text:#F5F0E8;--text-muted:rgba(245,240,232,0.55);--text-dim:rgba(245,240,232,0.4);
    --border:rgba(245,240,232,0.12);--border-light:rgba(245,240,232,0.08);
    --accent:#E8FF00;--red:#FF4D4D;
    --radius:10px;
  }
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

  /* ── NAV STICKY ── */
  nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  nav .logo{font-weight:700;font-size:15px;color:var(--accent);margin-right:auto;letter-spacing:-0.3px}
  nav a{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;transition:all .2s}
  nav a:hover,nav a.active{color:var(--text);background:rgba(245,240,232,0.06)}

  /* ── LAYOUT ── */
  .container{max-width:1200px;margin:0 auto;padding:32px 20px}
  section{margin-bottom:64px}
  h2{font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px}
  .section-sub{color:var(--text-muted);font-size:14px;margin-bottom:32px}

  /* ── AGENT CARDS ── */
  .agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .agent-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;transition:border-color .2s,box-shadow .2s}
  .agent-card:hover{border-color:rgba(232,255,0,0.25)}
  .agent-card.highlighted{border-color:var(--accent);box-shadow:0 0 20px rgba(232,255,0,0.08)}
  .agent-name{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px}
  .agent-name .at{color:var(--accent);font-weight:400;font-size:13px}
  .agent-role{font-size:12px;color:var(--text-muted);margin-bottom:10px}
  .agent-desc{font-size:13px;color:var(--text-muted);line-height:1.6;flex:1}
  .agent-phase{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);background:rgba(232,255,0,0.08);padding:3px 8px;border-radius:4px;margin-bottom:10px;width:fit-content}

  /* ── CHAMPS REQUIS ── */
  .agent-required{border-top:1px solid var(--border-light);margin-top:14px;padding-top:10px}
  .agent-required-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
  .required-tags{display:flex;flex-wrap:wrap;gap:4px}
  .required-tag{font-size:11px;color:var(--text-muted);border:1px solid rgba(245,240,232,0.15);border-radius:4px;padding:2px 7px;white-space:nowrap}

  /* ── PROMPTS ── */
  .search-wrap{display:flex;justify-content:center;margin-bottom:28px}
  .search-box{position:relative;width:100%;max-width:400px}
  .search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
  .search-box input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;padding:10px 14px 10px 40px;outline:none;transition:border-color .2s}
  .search-box input::placeholder{color:var(--text-dim)}
  .search-box input:focus{border-color:var(--accent)}
  .no-results{display:none;text-align:center;color:var(--text-muted);font-size:14px;padding:32px 0}

  .prompt-category{margin-bottom:32px}
  .prompt-category h3{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
  .prompt-category h3 .cat-icon{font-size:14px}
  .prompts-list{display:flex;flex-direction:column;gap:10px}
  .prompt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s}
  .prompt-card:hover{border-color:rgba(232,255,0,0.2)}
  .prompt-card.hidden{display:none}
  .prompt-title{font-size:14px;font-weight:600;margin-bottom:6px}
  .prompt-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .prompt-agent-tag{font-size:11px;color:var(--accent);border:1px solid rgba(232,255,0,0.25);border-radius:4px;padding:1px 6px}
  .prompt-body{font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-line}
  .prompt-body strong{color:var(--text);font-weight:600}

  /* ── CHANGELOG ── */
  .changelog-controls{margin-bottom:20px}
  .changelog-controls select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:6px 12px;outline:none;cursor:pointer}
  .changelog-controls select:focus{border-color:var(--accent)}
  .changelog-list{display:flex;flex-direction:column;gap:10px}
  .changelog-entry{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:background .15s;flex-wrap:wrap}
  .changelog-entry:hover{background:rgba(245,240,232,0.03)}
  .changelog-date{font-size:12px;color:var(--text-dim);min-width:85px;padding-top:2px}
  .changelog-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}
  .badge-nouveau{background:var(--accent);color:#000}
  .badge-maj{border:1px solid var(--accent);color:var(--accent);background:transparent}
  .badge-supprime{border:1px solid var(--red);color:var(--red);background:transparent}
  .badge-agent{font-size:11px;color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:2px 7px}
  .changelog-desc{font-size:13px;color:var(--text-muted);flex:1;min-width:200px}

  /* ── RESPONSIVE ── */
  @media(max-width:600px){
    .agents-grid{grid-template-columns:1fr}
    .search-box{max-width:100%}
    .changelog-entry{flex-direction:column;gap:6px}
    nav{padding:10px 16px}
    nav a{font-size:12px;padding:5px 10px}
  }
</style>
</head>
<body>

<script>
/* ── Helpers ── */
function stripAccents(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")}

/* ── Render agents ── */
(function renderAgents(){
  const grid=document.getElementById("agents-grid");
  AGENTS.forEach(a=>{
    const card=document.createElement("div");
    card.className="agent-card";
    card.dataset.agent=a.id;
    card.innerHTML=`
      <div class="agent-phase">${a.phase}</div>
      <div class="agent-name"><span class="at">${a.at}</span> ${a.name}</div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-desc">${a.desc}</div>
      <div class="agent-required">
        <div class="agent-required-label">Requis</div>
        <div class="required-tags">${a.required.map(r=>`<span class="required-tag">${r}</span>`).join("")}</div>
      </div>`;
    grid.appendChild(card);
  });
})();

/* ── Render prompts ── */
(function renderPrompts(){
  const container=document.getElementById("prompts-container");
  PROMPTS.forEach(cat=>{
    const section=document.createElement("div");
    section.className="prompt-category";
    section.innerHTML=`<h3>${cat.category}</h3>`;
    const list=document.createElement("div");
    list.className="prompts-list";
    cat.items.forEach(p=>{
      const card=document.createElement("div");
      card.className="prompt-card";
      card.dataset.search=stripAccents([p.title,p.agents.join(" "),p.contexte,p.livrable,p.exemple].join(" ")).toLowerCase();
      card.innerHTML=`
        <div class="prompt-title">${p.title}</div>
        <div class="prompt-meta">${p.agents.map(a=>`<span class="prompt-agent-tag">@${a}</span>`).join("")}</div>
        <div class="prompt-body"><strong>[CONTEXTE]</strong> ${p.contexte}
<strong>[LIVRABLE]</strong> ${p.livrable}
<strong>[EXEMPLE]</strong> ${p.exemple}</div>`;
      list.appendChild(card);
    });
    section.appendChild(list);
    container.appendChild(section);
  });
})();

/* ── Search ── */
(function initSearch(){
  const input=document.getElementById("prompt-search");
  const noResults=document.getElementById("no-results");
  input.addEventListener("input",function(){
    const q=stripAccents(this.value.trim()).toLowerCase();
    const cards=document.querySelectorAll(".prompt-card");
    let visible=0;
    cards.forEach(c=>{
      if(!q||c.dataset.search.includes(q)){c.classList.remove("hidden");visible++}
      else{c.classList.add("hidden")}
    });
    /* hide empty categories */
    document.querySelectorAll(".prompt-category").forEach(cat=>{
      const has=cat.querySelectorAll(".prompt-card:not(.hidden)").length>0;
      cat.style.display=has?"":"none";
    });
    noResults.style.display=visible===0&&q?"block":"none";
  });
})();

/* ── Changelog ── */
(function renderChangelog(){
  const list=document.getElementById("changelog-list");
  const filter=document.getElementById("changelog-filter");
  const agentSet=new Set();

  /* populate filter */
  CHANGELOG.forEach(e=>agentSet.add(e.agent));
  agentSet.forEach(a=>{
    const opt=document.createElement("option");
    opt.value=a;opt.textContent="@"+a;
    filter.appendChild(opt);
  });

  function badgeClass(type){
    if(type==="nouveau")return"badge badge-nouveau";
    if(type==="supprimé")return"badge badge-supprime";
    return"badge badge-maj";
  }

  function render(agentFilter){
    list.innerHTML="";
    const entries=CHANGELOG.slice().sort((a,b)=>b.date.localeCompare(a.date));
    entries.forEach(e=>{
      if(agentFilter!=="tous"&&e.agent!==agentFilter)return;
      const el=document.createElement("div");
      el.className="changelog-entry";
      el.dataset.agent=e.agent;
      el.innerHTML=`
        <span class="changelog-date">${e.date}</span>
        <div class="changelog-badges">
          <span class="${badgeClass(e.type)}">${e.type}</span>
          <span class="badge-agent">@${e.agent}</span>
        </div>
        <span class="changelog-desc">${e.description}</span>`;

      /* highlight card on hover */
      el.addEventListener("mouseenter",()=>{
        document.querySelectorAll(`.agent-card[data-agent="${e.agent}"]`).forEach(c=>c.classList.add("highlighted"));
      });
      el.addEventListener("mouseleave",()=>{
        document.querySelectorAll(".agent-card.highlighted").forEach(c=>c.classList.remove("highlighted"));
      });
      list.appendChild(el);
    });
  }

  filter.addEventListener("change",()=>render(filter.value));
  render("tous");
})();
</script>
